<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Growth App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: var(--tg-theme-bg-color, #0f172a);
            --text-color: var(--tg-theme-text-color, #f8fafc);
            --hint-color: var(--tg-theme-hint-color, #94a3b8);
            --accent-color: var(--tg-theme-button-color, #10b981);
            --accent-text: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.08);
            --font: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .view {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 90px;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        .card:active {
            transform: scale(0.98);
        }

        .secondary-btn {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            color: var(--hint-color);
            text-align: center;
            padding: 12px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .secondary-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; padding: 20px 0 10px; }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-color), var(--hint-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            margin-top: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .badges { display: flex; gap: 8px; margin-bottom: 16px; }
        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge.pillar { background: rgba(16, 185, 129, 0.15); color: #34d399; }

        .task-title { font-size: 22px; font-weight: 700; margin: 0 0 12px 0; line-height: 1.3; }
        .task-desc { font-size: 15px; color: var(--hint-color); line-height: 1.5; margin-bottom: 20px; }

        .resource-btn {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            text-align: center;
            padding: 14px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
            box-sizing: border-box;
        }

        .why-next {
            font-size: 13px; font-style: italic; color: var(--hint-color);
            border-left: 3px solid var(--accent-color);
            padding-left: 10px; margin-bottom: 30px;
        }

        .done-btn {
            width: 100%;
            background: var(--accent-color);
            color: var(--accent-text);
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
        }

        .done-btn.locked {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            cursor: not-allowed;
        }

        .lock-notice {
            display: none;
            color: #ffcc00;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            font-style: italic;
        }

        /* Nav */
        .nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            display: flex; padding: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }
        .nav-item {
            flex: 1; text-align: center; padding: 12px;
            border-radius: 18px; color: var(--hint-color);
            font-size: 14px; font-weight: 600;
        }
        .nav-item.active { background: rgba(255, 255, 255, 0.1); color: var(--text-color); }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 16px; border-radius: 16px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--text-color); }
        .stat-label { font-size: 13px; color: var(--hint-color); }

        .loading {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 200;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .loading.show { opacity: 1; pointer-events: all; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div id="loader" class="loading show">
        <div class="spinner"></div>
        <div id="loadText" style="color: var(--hint-color);">Loading...</div>
    </div>

    <div id="view-home" class="view active">
        <div class="header"><h1>Current Task</h1></div>
        <div class="card" id="taskCard">
            <div class="badges">
                <div class="badge pillar" id="tPillar">📌 Pillar</div>
                <div class="badge" id="tType">🔹 Type</div>
            </div>
            <h2 class="task-title" id="tTitle">Fetching...</h2>
            <p class="task-desc" id="tDesc">...</p>
            <a href="#" class="resource-btn" id="tResource" target="_blank">🔗 Open Resource</a>
            <a href="#" class="secondary-btn" id="tSearch" target="_blank">🔍 Search for this Topic</a>
            <div class="why-next" id="tWhy">...</div>
            <button class="done-btn" id="doneBtn" onclick="completeTask()">Task Completed</button>
            <div id="lockNotice" class="lock-notice">Growth takes time. Focus on your current task for today.</div>
        </div>
    </div>

    <div id="view-progress" class="view">
        <div class="header"><h1>Your Growth</h1></div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="pTotal">0</div>
                <div class="stat-label">Tasks Done</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pStreak">0</div>
                <div class="stat-label">Day Streak 🔥</div>
            </div>
        </div>
        <div id="pillarStats" style="background: var(--card-bg); padding: 20px; border-radius: 20px;">
            <!-- Dynamic pillars go here -->
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')">🏠 Home</div>
        <div class="nav-item" id="nav-progress" onclick="switchTab('progress')">📊 Progress</div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxq8z0eil7TGCi9PVfNzGIzagGbp0ctUkksOe0z1J7fTnhVNGjPLntTi9t_6u-1h-TYLg/exec";
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const user = tg.initDataUnsafe?.user || { id: "12345", first_name: "Guest" };
        const icons = {
            "Marketing": "📣", "Thinking": "🧠", "Discipline": "💪", "Self-Growth": "🌿",
            "Read": "📖", "Listen": "🎧", "Watch": "📺", "Do": "✍️"
        };

        function showLoader(text) {
            document.getElementById('loadText').innerText = text;
            document.getElementById('loader').classList.add('show');
        }
        function hideLoader() { document.getElementById('loader').classList.remove('show'); }

        function switchTab(tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
            if (tab === 'progress') loadProgress();
        }

        async function loadTask() {
            try {
                showLoader("Syncing journey...");
                const res = await fetch(`${WEB_APP_URL}?action=getTask&userId=${user.id}&username=${user.first_name}`);
                const task = await res.json();
                renderTask(task);
            } catch (e) {
                console.error(e);
                document.getElementById('tTitle').innerText = "Offline";
            } finally { hideLoader(); }
        }

        function renderTask(task) {
            document.getElementById('tPillar').innerHTML = `${icons[task.pillar] || '📌'} ${task.pillar}`;
            document.getElementById('tType').innerHTML = `${icons[task.type] || '🔹'} ${task.type}`;
            document.getElementById('tTitle').innerText = task.title;
            document.getElementById('tDesc').innerText = task.description;
            document.getElementById('tWhy').innerText = task.whyNext || "";

            const btn = document.getElementById('tResource');
            if (task.resource && task.resource.startsWith('http')) {
                btn.href = task.resource;
                btn.style.display = 'block';
            } else { btn.style.display = 'none'; }

            // 🛡️ Search Safety Net
            const searchBtn = document.getElementById('tSearch');
            searchBtn.href = `https://www.google.com/search?q=${encodeURIComponent(task.title + " " + task.pillar)}`;

            const doneBtn = document.getElementById('doneBtn');
            const lockNotice = document.getElementById('lockNotice');
            if (task.isLocked) {
                doneBtn.classList.add('locked');
                doneBtn.innerText = "Locked for Today";
                lockNotice.style.display = 'block';
            } else {
                doneBtn.classList.remove('locked');
                doneBtn.innerText = "Task Completed";
                lockNotice.style.display = 'none';
            }
        }

        async function completeTask() {
            if (document.getElementById('doneBtn').classList.contains('locked')) {
                tg.showAlert("Growth takes time. Focus on your current task for today.");
                return;
            }

            try {
                showLoader("Saving progress...");
                const res = await fetch(`${WEB_APP_URL}?action=done&userId=${user.id}&username=${user.first_name}`);
                const task = await res.json();
                if (task.error) {
                    tg.showAlert(task.error);
                } else {
                    renderTask(task);
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } catch (e) { console.error(e); }
            finally { hideLoader(); }
        }

        async function loadProgress() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=progress&userId=${user.id}`);
                const data = await res.json();
                
                document.getElementById('pTotal').innerText = data.total;
                document.getElementById('pStreak').innerText = data.streak;

                // 📊 Render Pillar Bars
                const pillarContainer = document.getElementById('pillarStats');
                pillarContainer.innerHTML = '<h3 style="margin: 0 0 16px 0; font-size: 16px; color: var(--text-color);">Growth Pillars</h3>';
                
                const total = data.total || 1;
                for (const [name, count] of Object.entries(data.pillars)) {
                    const percent = Math.max(5, Math.round((count / total) * 100));
                    const row = document.createElement('div');
                    row.style.marginBottom = '15px';
                    row.innerHTML = `
                        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: var(--hint-color);">
                            <span>${icons[name] || ''} ${name}</span>
                            <span>${count} tasks</span>
                        </div>
                        <div style="height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;">
                            <div style="width: ${percent}%; height: 100%; background: var(--accent-color); border-radius: 10px; box-shadow: 0 0 10px var(--accent-color); transition: width 1s ease;"></div>
                        </div>
                    `;
                    pillarContainer.appendChild(row);
                }

                // 📜 Render Recent History
                if (data.history && data.history.length > 0) {
                    const histHeader = document.createElement('h3');
                    histHeader.style.cssText = "margin: 25px 0 15px 0; font-size: 16px; color: var(--text-color);";
                    histHeader.innerText = "Recent Wins";
                    pillarContainer.appendChild(histHeader);

                    data.history.forEach(item => {
                        const hRow = document.createElement('div');
                        hRow.style.cssText = "background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);";
                        hRow.innerHTML = `
                            <div style="font-size: 14px; font-weight: 600;">${item.title}</div>
                            <div style="font-size: 11px; color: var(--hint-color); margin-top: 4px;">${icons[item.pillar]} ${item.pillar} • ${new Date(item.dateCompleted).toLocaleDateString()}</div>
                        `;
                        pillarContainer.appendChild(hRow);
                    });
                }
            } catch (e) { console.error(e); }
        }

        window.onload = loadTask;
    </script>
</body>
</html>
